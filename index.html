<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #121212 0%, #1c1c28 50%, #0f172a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Segoe UI", sans-serif;
        }

        .container {
            text-align: center;
            color: rgba(255, 255, 255, 0.15);
        }

        h1 {
            font-size: 64px;
            font-weight: 300;
            letter-spacing: 12px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>MY DESKTOP</h1>
    </div>
</body>

</html>
